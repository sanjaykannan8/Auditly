# Auditly — local infrastructure + ingestion.
#
# Services: postgres (app DB), mysql (scraper/relay outbox), mongodb (agent output),
# rabbitmq (queue), scraper + relay (Python ingestion). The FastAPI backend, the agent
# consumer, and the Next.js frontend run on the HOST and connect via localhost ports.
#
# First run (fresh volumes so the strong passwords initialize):
#   docker compose down -v && docker compose up -d --build

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: auditly
      POSTGRES_USER: auditly
      POSTGRES_PASSWORD: Pg_Auditly_7Rx2Qe9Lp
    ports:
      - "5400:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditly -d auditly"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: MyRoot_Auditly_3Tz8Lw5Bq
      MYSQL_DATABASE: auditly_outbox
      MYSQL_USER: auditly
      MYSQL_PASSWORD: My_Auditly_5Tz8Lw3Bq
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      # Auto-create the outbox table on first boot
      - ./ingestion/outbox-schema.sql:/docker-entrypoint-initdb.d/01-outbox-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uauditly", "-pMy_Auditly_5Tz8Lw3Bq"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: auditly
      MONGO_INITDB_ROOT_PASSWORD: Mng_Auditly_4Vp6Np1Sd
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: auditly
      RABBITMQ_DEFAULT_PASS: Rmq_Auditly_8Hc3Jx5Fp
      RABBITMQ_DEFAULT_VHOST: auditly
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot: declare exchanges/queues/bindings, then exit.
  rabbitmq-topology:
    build: ./ingestion
    command: python topology.py
    environment:
      CLOUDAMQP_URL: amqp://auditly:Rmq_Auditly_8Hc3Jx5Fp@rabbitmq:5672/auditly
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: "no"

  scraper:
    build: ./ingestion
    command: python scraper.py
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: auditly
      MYSQL_PASSWORD: My_Auditly_5Tz8Lw3Bq
      MYSQL_DB: auditly_outbox
      SCRAPER_INTERVAL_MINUTES: "5"
      CUTOFF_DATE: "March 31, 2026"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  relay:
    build: ./ingestion
    command: python relay.py
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: auditly
      MYSQL_PASSWORD: My_Auditly_5Tz8Lw3Bq
      MYSQL_DB: auditly_outbox
      RELAY_INTERVAL_MINUTES: "6"
      CLOUDAMQP_URL: amqp://auditly:Rmq_Auditly_8Hc3Jx5Fp@rabbitmq:5672/auditly
      EXCHANGE: regulations
      ROUTING_KEY: regulation.rbi.new
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rabbitmq-topology:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  mysqldata:
  mongodata:
  rabbitmqdata:
